<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AIESEC Matching Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/javascript-lp-solver@0.4.24/prod/solver.js"></script>

  <style>
    body { font-family: Arial; max-width: 950px; margin: 40px auto; }
    button { padding:10px 16px; margin:10px 10px 0 0; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .error { color: red; }
    .success { color: green; }
    pre { background:#f5f5f5; padding:15px; white-space: pre-wrap; }
    .row { margin: 10px 0; }
    label { display:inline-block; width: 220px; }
    input[type="number"] { width: 90px; }
  </style>
</head>

<body>
  <h1>AIESEC Matching Tool</h1>

  <h3>Upload files</h3>
  <div class="row">EPs.csv: <input type="file" id="epsFile" accept=".csv"></div>
  <div class="row">Locations.csv: <input type="file" id="locFile" accept=".csv"></div>

  <h3>Parameters</h3>
  <div class="row">
    <label>Duration (weeks)</label>
    <input type="number" id="weeksDuration" value="6" min="1" max="52" />
  </div>
  <div class="row">
    <label>Penalty unassigned</label>
    <input type="number" id="penaltyUnassigned" value="5000" min="0" step="1" />
  </div>
  <div class="row">
    <label>Preference points (1/2/3/4)</label>
    <input type="number" id="p1" value="1000" step="1" /> /
    <input type="number" id="p2" value="120" step="1" /> /
    <input type="number" id="p3" value="20" step="1" /> /
    <input type="number" id="p4" value="0" step="1" />
  </div>
  <div class="row">
    <label>Score weight (tie-breaker)</label>
    <input type="number" id="scoreWeight" value="5" step="1" />
  </div>

  <div class="row">
    <button id="btnValidate">Validate</button>
    <button id="btnRun" disabled>Run Matching</button>
  </div>

  <h3>Status</h3>
  <pre id="output">Ready. Upload files, then validate.</pre>

<script>
  // ---------------- UI helpers ----------------
  const out = document.getElementById("output");
  const btnValidate = document.getElementById("btnValidate");
  const btnRun = document.getElementById("btnRun");

  function setStatus(msg, cls="") {
    out.className = cls;
    out.textContent = msg;
  }
  function showError(msg) {
    setStatus("ERROR: " + msg, "error");
    throw new Error(msg);
  }

  // ---------------- CSV helpers ----------------
  function parseCSV(file) {
    return new Promise((resolve, reject) => {
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: r => resolve(r.data),
        error: err => reject(err)
      });
    });
  }

  function downloadCSV(filename, rows) {
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
  }

  // ---------------- Normalizers ----------------
  function normalizeCode(s) {
    return (s || "").toLowerCase().trim().replaceAll(" ", "_");
  }
  function normalizeName(s) {
    return (s || "").toLowerCase().trim().replace(/\s+/g, " ");
  }
  function isNoPreference(raw) {
    const p = normalizeCode(raw);
    return (
      !p ||
      [
        "i_dont_care", "i_don't_care", "idc",
        "dont_care", "don't_care",
        "doesnt_care", "doesn't_care",
        "does_not_matter", "doesnt_matter", "doesn't_matter",
        "no_preference", "no_pref", "any",
        "n/a", "na", "none", "-"
      ].includes(p)
    );
  }
  function normGender(s) {
    const q = (s || "").toLowerCase().trim();
    if (["f","female","vrouw","woman","girl","vrouwelijk"].includes(q)) return "F";
    if (["m","male","man","boy","jongen","mannelijk"].includes(q)) return "M";
    return "X";
  }

  // Accept yyyy-mm-dd and dd/mm/yyyy or mm/dd/yyyy
  function parseDateFlexible(str) {
    if (!str) return null;
    str = String(str).trim();

    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
      const d = new Date(str);
      return isNaN(d) ? null : d;
    }

    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)) {
      const [a,b,c] = str.split("/");
      const d1 = new Date(`${c}-${b}-${a}`); // dd/mm/yyyy
      if (!isNaN(d1)) return d1;
      const d2 = new Date(`${c}-${a}-${b}`); // mm/dd/yyyy
      if (!isNaN(d2)) return d2;
    }

    return null;
  }

  // Dates helpers
  function addDays(d, days) {
    const x = new Date(d.getTime());
    x.setDate(x.getDate() + days);
    return x;
  }
  function addWeeks(d, w) {
    return addDays(d, 7*w);
  }
  function dateToISO(d) {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }
  function nextMonday(d) {
    // JS: Sunday=0 ... Saturday=6. Monday=1.
    const day = d.getDay();
    const offset = (day === 1) ? 0 : ((8 - day) % 7);
    return addDays(d, offset);
  }
  function mondaysBetween(startMonday, endMonday) {
    const out = [];
    let cur = new Date(startMonday.getTime());
    while (cur <= endMonday) {
      out.push(new Date(cur.getTime()));
      cur = addWeeks(cur, 1);
    }
    return out;
  }
  function lastStartMondayGivenLatestEnd(latestEnd, weeksDuration) {
    const d = addWeeks(latestEnd, -weeksDuration);
    return nextMonday(d);
  }

  // ---------------- Data ----------------
  let epsData = null;
  let locData = null;

  // ---------------- Validation + friend consistency ----------------
  function runValidationAndFriendChecks() {
    const requiredEPCols = [
      "ep_id","full_name","gender","earliest_start_date","latest_end_date",
      "preferred_location_1","preferred_location_2","preferred_location_3","preferred_location_4",
      "wants_pair","pair_with_full_name","score"
    ];
    const requiredLocCols = ["loc_code","capacity_total"];

    const epHeaders = Object.keys(epsData?.[0] || {});
    const locHeaders = Object.keys(locData?.[0] || {});

    requiredEPCols.forEach(col => {
      if (!epHeaders.includes(col)) showError(`EPs.csv missing column "${col}"`);
    });
    requiredLocCols.forEach(col => {
      if (!locHeaders.includes(col)) showError(`Locations.csv missing column "${col}"`);
    });

    // duplicates EP
    const epIds = epsData.map(r => (r.ep_id || "").trim());
    const dupEP = epIds.find((id, i) => id && epIds.indexOf(id) !== i);
    if (dupEP) showError(`Duplicate ep_id found: ${dupEP}`);

    // duplicates locations
    const locCodes = locData.map(r => normalizeCode(r.loc_code));
    const dupLoc = locCodes.find((id, i) => id && locCodes.indexOf(id) !== i);
    if (dupLoc) showError(`Duplicate loc_code found: ${dupLoc}`);

    // dates
    epsData.forEach((row, i) => {
      const start = parseDateFlexible(row.earliest_start_date);
      const end = parseDateFlexible(row.latest_end_date);
      if (!start) showError(`Row ${i+2}: earliest_start_date invalid`);
      if (!end) showError(`Row ${i+2}: latest_end_date invalid`);
      if (start > end) showError(`Row ${i+2}: earliest_start_date after latest_end_date`);
    });

    // preference existence
    const locSet = new Set(locCodes);
    epsData.forEach((row, i) => {
      for (let k=1;k<=4;k++) {
        const raw = row[`preferred_location_${k}`];
        if (isNoPreference(raw)) continue;
        const pref = normalizeCode(raw);
        if (!locSet.has(pref)) showError(`Row ${i+2}: preferred_location_${k} "${raw}" not in Locations.csv`);
      }
    });

    // friend name checks (must be resolvable)
    const nameToIds = new Map(); // normName -> [ep_id]
    epsData.forEach(r => {
      const nm = normalizeName(r.full_name);
      const id = (r.ep_id || "").trim();
      if (!nm || !id) return;
      if (!nameToIds.has(nm)) nameToIds.set(nm, []);
      nameToIds.get(nm).push(id);
    });

    epsData.forEach((row, i) => {
      const wants = String(row.wants_pair || "").trim().toLowerCase() === "yes";
      if (!wants) return;

      const raw = String(row.pair_with_full_name || "").trim();
      if (!raw) showError(`Row ${i+2}: wants_pair=yes but pair_with_full_name is empty`);

      const friends = raw.split(",").map(s => normalizeName(s)).filter(Boolean);
      if (friends.length === 0) showError(`Row ${i+2}: wants_pair=yes but no names found in pair_with_full_name`);

      for (const fn of friends) {
        const ids = nameToIds.get(fn) || [];
        if (ids.length === 0) showError(`Row ${i+2}: friend "${fn}" not found in full_name list`);
        if (ids.length > 1) showError(`Row ${i+2}: friend "${fn}" is ambiguous (multiple people share this name: ${ids.join(", ")})`);
      }
    });

    setStatus("Validation successful. You can now run matching.", "success");
    btnRun.disabled = false;
  }

  // ---------------- Preference scoring ----------------
  function prefScore(epRow, locCode, PREF_POINTS) {
    const raw = [1,2,3,4].map(k => epRow[`preferred_location_${k}`] || "");
    const cleaned = [];
    for (const p of raw) {
      if (isNoPreference(p)) continue;
      const q = normalizeCode(p);
      if (q) cleaned.push(q);
    }
    const code = normalizeCode(locCode);
    const idx = cleaned.indexOf(code);
    if (idx >= 0) return PREF_POINTS[idx+1] ?? 0;
    return 0;
  }

  // ---------------- Friend groups (connected components) ----------------
  function buildFriendGroups(EPs) {
    // Map full_name -> ep_id (must be unique; we validated already)
    const nameToId = new Map();
    for (const e of EPs) nameToId.set(normalizeName(e.full_name), e.ep_id);

    // Build undirected edges
    const adj = new Map(); // ep_id -> Set(ep_id)
    function addEdge(a, b) {
      if (!adj.has(a)) adj.set(a, new Set());
      if (!adj.has(b)) adj.set(b, new Set());
      adj.get(a).add(b);
      adj.get(b).add(a);
    }

    for (const e of EPs) {
      if (!e.wants_pair) continue;

      const friends = String(e.pair_with_full_name || "")
        .split(",")
        .map(s => normalizeName(s))
        .filter(Boolean);

      for (const fn of friends) {
        const fid = nameToId.get(fn);
        if (!fid) continue; // should not happen due to validation
        if (fid === e.ep_id) continue;
        addEdge(e.ep_id, fid);
      }
    }

    // Connected components
    const visited = new Set();
    const groups = [];

    for (const e of EPs) {
      const start = e.ep_id;
      if (visited.has(start)) continue;
      if (!adj.has(start)) continue;

      const stack = [start];
      visited.add(start);
      const comp = [];

      while (stack.length) {
        const u = stack.pop();
        comp.push(u);
        for (const v of adj.get(u)) {
          if (!visited.has(v)) {
            visited.add(v);
            stack.push(v);
          }
        }
      }

      if (comp.length >= 2) groups.push(comp.sort());
    }

    return groups;
  }

  // ---------------- Build and solve MILP ----------------
  function buildAndSolveModel() {
    if (!window.solver) showError("MILP solver library did not load (solver.js).");

    const WEEKS_DURATION = Number(document.getElementById("weeksDuration").value || 6);
    const PENALTY_UNASSIGNED = Number(document.getElementById("penaltyUnassigned").value || 5000);
    const SCORE_WEIGHT = Number(document.getElementById("scoreWeight").value || 5);

    const PREF_POINTS = {
      1: Number(document.getElementById("p1").value || 1000),
      2: Number(document.getElementById("p2").value || 120),
      3: Number(document.getElementById("p3").value || 20),
      4: Number(document.getElementById("p4").value || 0),
    };

    // Normalize locations
    const Locations = locData.map(r => ({
      loc_code: normalizeCode(r.loc_code),
      capacity_total: Number(r.capacity_total),
      cap_female_max: (r.cap_female_max === "" || r.cap_female_max == null) ? null : Number(r.cap_female_max),
      cap_male_max: (r.cap_male_max === "" || r.cap_male_max == null) ? null : Number(r.cap_male_max),
    }));
    const locCodes = Locations.map(L => L.loc_code);
    const locByCode = Object.fromEntries(Locations.map(L => [L.loc_code, L]));

    // Normalize EPs
    const EPs = epsData.map(r => {
      const earliest = parseDateFlexible(r.earliest_start_date);
      const latest = parseDateFlexible(r.latest_end_date);
      const score = isNaN(Number(String(r.score || "").replace(",", "."))) ? 0 : Number(String(r.score || "").replace(",", "."));
      return {
        ep_id: (r.ep_id || "").trim(),
        full_name: r.full_name || "",
        gender: normGender(r.gender),
        earliest_start_date: earliest,
        latest_end_date: latest,
        wants_pair: String(r.wants_pair || "").trim().toLowerCase() === "yes",
        pair_with_full_name: r.pair_with_full_name || "",
        score: score,
        preferred_location_1: r.preferred_location_1 || "",
        preferred_location_2: r.preferred_location_2 || "",
        preferred_location_3: r.preferred_location_3 || "",
        preferred_location_4: r.preferred_location_4 || "",
      };
    });

    // Allowed Monday starts
    const EP_allowed = new Map(); // ep_id -> [Date Mondays]
    const allMondays = [];
    for (const e of EPs) {
      const startM = nextMonday(e.earliest_start_date);
      const lastStart = lastStartMondayGivenLatestEnd(e.latest_end_date, WEEKS_DURATION);
      const allowed = (startM <= lastStart) ? mondaysBetween(startM, lastStart) : [];
      EP_allowed.set(e.ep_id, allowed);
      for (const m of allowed) allMondays.push(new Date(m.getTime()));
    }
    if (allMondays.length === 0) showError("No feasible Monday starts found. Check date windows.");

    // Global weeks grid
    const minM = new Date(Math.min(...allMondays.map(d => d.getTime())));
    const maxAllowedStart = new Date(Math.max(...allMondays.map(d => d.getTime())));
    const maxM = addWeeks(maxAllowedStart, WEEKS_DURATION - 1);
    const weeks = mondaysBetween(minM, maxM);
    const weekIndex = new Map(weeks.map((d, i) => [dateToISO(d), i]));

    // Build friend groups
    const groups = buildFriendGroups(EPs);

    // Model
    const model = {
      optimize: "obj",
      opType: "max",
      constraints: {},
      variables: {},
      ints: {}
    };

    function ensureConstraint(name, def) {
      if (!model.constraints[name]) model.constraints[name] = def;
    }
    function addCoef(varName, constraintName, coef) {
      if (!model.variables[varName]) model.variables[varName] = { obj: 0 };
      model.variables[varName][constraintName] = (model.variables[varName][constraintName] || 0) + coef;
    }
    function addObj(varName, coef) {
      if (!model.variables[varName]) model.variables[varName] = { obj: 0 };
      model.variables[varName].obj = (model.variables[varName].obj || 0) + coef;
    }
    function makeBin(varName) {
      model.ints[varName] = 1;
      ensureConstraint(`bin_lo_${varName}`, { min: 0 });
      ensureConstraint(`bin_hi_${varName}`, { max: 1 });
      addCoef(varName, `bin_lo_${varName}`, 1);
      addCoef(varName, `bin_hi_${varName}`, 1);
    }
    function fixToZero(varName) {
      const c = `fix0_${varName}`;
      ensureConstraint(c, { equal: 0 });
      addCoef(varName, c, 1);
    }

    // Create x vars
    const xVars = []; // {eid, l, sISO, varName}
    for (const e of EPs) {
      const eid = e.ep_id;
      for (const l of locCodes) {
        for (const s of (EP_allowed.get(eid) || [])) {
          const sISO = dateToISO(s);
          const varName = `x|${eid}|${l}|${sISO}`;
          makeBin(varName);
          xVars.push({ eid, l, sISO, varName });

          // preferences
          const sc = prefScore(e, l, PREF_POINTS);
          if (sc) addObj(varName, sc);

          // first-choice big bonus
          const first = normalizeCode(e.preferred_location_1);
          if (first && first === l) addObj(varName, 1000000);

          // score tie-breaker (applies to any assignment)
          addObj(varName, SCORE_WEIGHT * (e.score || 0));
        }
      }
    }

    // u vars + ep_one constraints
    for (const e of EPs) {
      const eid = e.ep_id;
      const c = `ep_one_${eid}`;
      ensureConstraint(c, { equal: 1 });

      const uName = `u|${eid}`;
      makeBin(uName);
      addCoef(uName, c, 1);
      addObj(uName, -PENALTY_UNASSIGNED);

      for (const xv of xVars) {
        if (xv.eid === eid) addCoef(xv.varName, c, 1);
      }
    }

    // Weekly occupancy + gender caps + never-alone
    for (const l of locCodes) {
      const capTotal = locByCode[l].capacity_total;
      const capF = locByCode[l].cap_female_max;
      const capM = locByCode[l].cap_male_max;

      for (let w = 0; w < weeks.length; w++) {
        const wISO = dateToISO(weeks[w]);

        const cCap = `cap_${l}_${wISO}`;
        ensureConstraint(cCap, { max: capTotal });

        const cCapF = (capF != null) ? `capF_${l}_${wISO}` : null;
        const cCapM = (capM != null) ? `capM_${l}_${wISO}` : null;
        if (cCapF) ensureConstraint(cCapF, { max: capF });
        if (cCapM) ensureConstraint(cCapM, { max: capM });

        // never-alone: either 0 or >=2
        const openName = `open|${l}|${wISO}`;
        makeBin(openName);

        const cNAlo = `na_lo_${l}_${wISO}`;
        ensureConstraint(cNAlo, { min: 0 });
        addCoef(openName, cNAlo, -2);

        const cNAhi = `na_hi_${l}_${wISO}`;
        ensureConstraint(cNAhi, { max: 0 });
        addCoef(openName, cNAhi, -capTotal);

        for (const xv of xVars) {
          if (xv.l !== l) continue;
          const sIdx = weekIndex.get(xv.sISO);
          if (sIdx == null) continue;

          const present = (sIdx <= w) && (w < sIdx + WEEKS_DURATION);
          if (!present) continue;

          addCoef(xv.varName, cCap, 1);
          addCoef(xv.varName, cNAlo, 1);
          addCoef(xv.varName, cNAhi, 1);

          if (cCapF || cCapM) {
            const ep = EPs.find(e => e.ep_id === xv.eid);
            if (ep) {
              if (cCapF && ep.gender === "F") addCoef(xv.varName, cCapF, 1);
              if (cCapM && ep.gender === "M") addCoef(xv.varName, cCapM, 1);
            }
          }
        }
      }
    }

    // Friend groups: same (location,start) or all unassigned
    // Implementation:
    // - compute common starts = intersection of allowed starts
    // - create y|group|l|s for each common start and location
    // - tie each member: x[e,l,s] == y[group,l,s] for common starts
    // - forbid non-common start vars for members (fix to 0)
    // - enforce: sum_y + u_ref == 1
    // - enforce: u_member == u_ref for all members
    for (let gi = 0; gi < groups.length; gi++) {
      const comp = groups[gi]; // array of ep_ids
      const groupId = `g${gi}_${comp.join("_")}`;

      // common starts (ISO strings)
      let common = null;
      for (const eid of comp) {
        const arr = (EP_allowed.get(eid) || []).map(dateToISO);
        const set = new Set(arr);
        common = (common == null) ? set : new Set([...common].filter(x => set.has(x)));
      }
      const commonStarts = [...(common || new Set())].sort();

      const ref = comp[0];
      const uRef = `u|${ref}`;

      // u equality across group
      for (const eid of comp) {
        const uE = `u|${eid}`;
        const cEq = `u_eq_${groupId}_${eid}`;
        ensureConstraint(cEq, { equal: 0 });
        addCoef(uE, cEq, 1);
        addCoef(uRef, cEq, -1);
      }

      if (commonStarts.length === 0) {
        // no common start possible => force all x to 0 and keep u equal already
        for (const xv of xVars) {
          if (!comp.includes(xv.eid)) continue;
          fixToZero(xv.varName);
        }
        continue;
      }

      // Forbid non-common starts for each member
      for (const xv of xVars) {
        if (!comp.includes(xv.eid)) continue;
        if (!commonStarts.includes(xv.sISO)) fixToZero(xv.varName);
      }

      // Create group choice vars y[group,l,s]
      const yVars = [];
      for (const l of locCodes) {
        for (const sISO of commonStarts) {
          const yName = `y|${groupId}|${l}|${sISO}`;
          makeBin(yName);
          yVars.push(yName);

          // Tie each member: x - y = 0 for (l,s)
          for (const eid of comp) {
            const xName = `x|${eid}|${l}|${sISO}`;
            // only if x exists in model (it should, for common starts)
            if (!model.variables[xName]) continue;
            const cTie = `tie_${groupId}_${eid}_${l}_${sISO}`;
            ensureConstraint(cTie, { equal: 0 });
            addCoef(xName, cTie, 1);
            addCoef(yName, cTie, -1);
          }
        }
      }

      // sum_y + u_ref == 1
      const cChoose = `group_choose_${groupId}`;
      ensureConstraint(cChoose, { equal: 1 });
      addCoef(uRef, cChoose, 1);
      for (const yName of yVars) addCoef(yName, cChoose, 1);

      // (optional) limit sum_y <= 1 is implied by equality above, but safe:
      const cAtMost = `group_atmost_${groupId}`;
      ensureConstraint(cAtMost, { max: 1 });
      for (const yName of yVars) addCoef(yName, cAtMost, 1);
    }

    // Solve
    setStatus("Solving MILP (can take a bit)…", "");
    const result = window.solver.Solve(model);
    if (!result.feasible) showError("No feasible solution found (given constraints).");

    // Build assignments
    const assignments = [];
    for (const e of EPs) {
      let placed = null;
      for (const xv of xVars) {
        if (xv.eid !== e.ep_id) continue;
        if ((result[xv.varName] || 0) > 0.5) {
          placed = { loc: xv.l, startISO: xv.sISO };
          break;
        }
      }

      let endFridayISO = "";
      if (placed) {
        const startDate = new Date(placed.startISO);
        const endFriday = addDays(addWeeks(startDate, WEEKS_DURATION - 1), 4);
        endFridayISO = dateToISO(endFriday);
      }

      assignments.push({
        ep_id: e.ep_id,
        full_name: e.full_name,
        gender: e.gender,
        score: e.score,
        location: placed ? placed.loc : "",
        start_monday: placed ? placed.startISO : "",
        end_friday: placed ? endFridayISO : "",
        first_choice: normalizeCode(e.preferred_location_1),
        preference_points: placed ? prefScore(e, placed.loc, PREF_POINTS) : 0,
        grouped_with_friends: e.wants_pair ? "yes" : "no"
      });
    }

    // Weekly load export
    const weeklyLoad = [];
    for (const l of locCodes) {
      for (let w = 0; w < weeks.length; w++) {
        const wISO = dateToISO(weeks[w]);
        let head = 0;

        for (const a of assignments) {
          if (!a.location || a.location !== l) continue;
          const sIdx = weekIndex.get(a.start_monday);
          if (sIdx == null) continue;
          if (sIdx <= w && w < sIdx + WEEKS_DURATION) head += 1;
        }
        if (head > 0) weeklyLoad.push({ loc_code: l, week_monday: wISO, headcount: head });
      }
    }

    return { assignments, weeklyLoad };
  }

  // ---------------- Buttons ----------------
  btnValidate.addEventListener("click", async () => {
    const epsFile = document.getElementById("epsFile").files[0];
    const locFile = document.getElementById("locFile").files[0];
    if (!epsFile || !locFile) showError("Please upload both EPs.csv and Locations.csv");

    setStatus("Reading CSV files…", "");
    epsData = await parseCSV(epsFile);
    locData = await parseCSV(locFile);

    runValidationAndFriendChecks();
  });

  btnRun.addEventListener("click", async () => {
    if (!epsData || !locData) showError("Please validate files first.");

    const { assignments, weeklyLoad } = buildAndSolveModel();
    downloadCSV("assignment.csv", assignments);
    downloadCSV("location_weekly_load.csv", weeklyLoad);

    setStatus("Done. assignment.csv and location_weekly_load.csv downloaded.", "success");
  });

  if (!window.solver) {
    setStatus(
      "ERROR: MILP solver did not load.\n" +
      "If you opened via file://, switch to GitHub Pages https.\n" +
      "If you have an adblocker, allow cdn.jsdelivr.net.\n",
      "error"
    );
  }
</script>
</body>
</html>
