<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AIESEC Matching Tool</title>

  <!-- CSV parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial; max-width: 900px; margin: 40px auto; }
    button { padding:10px 16px; margin:10px 10px 0 0; }
    .error { color: red; }
    .success { color: green; }
    pre { background:#f5f5f5; padding:15px; white-space: pre-wrap; }
  </style>
</head>
<body>

<h1>AIESEC Matching Tool</h1>

<h3>Upload files</h3>
EPs.csv: <input type="file" id="epsFile" accept=".csv"><br><br>
Locations.csv: <input type="file" id="locFile" accept=".csv"><br><br>

<button id="btnValidate">Validate</button>
<button id="btnRun" disabled>Run Matching</button>

<h3>Status</h3>
<pre id="output">Loading solver…</pre>

<script type="module">
  // ================= UI helpers =================
  const out = document.getElementById("output");
  const btnValidate = document.getElementById("btnValidate");
  const btnRun = document.getElementById("btnRun");

  function setStatus(msg, cls="") {
    out.className = cls;
    out.textContent = msg;
  }

  function showError(msg) {
    setStatus("ERROR: " + msg, "error");
    throw new Error(msg);
  }

  function parseCSV(file) {
    return new Promise((resolve, reject) => {
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: r => resolve(r.data),
        error: err => reject(err)
      });
    });
  }

  function normalizeCode(s) {
    return (s || "").toLowerCase().trim().replaceAll(" ", "_");
  }

  function parseDateFlexible(str) {
    if (!str) return null;
    str = String(str).trim();

    // yyyy-mm-dd
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str);

    // dd/mm/yyyy or mm/dd/yyyy
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)) {
      const [a,b,c] = str.split("/");
      const d1 = new Date(`${c}-${b}-${a}`); // dd/mm/yyyy
      if (!isNaN(d1)) return d1;
      const d2 = new Date(`${c}-${a}-${b}`); // mm/dd/yyyy
      if (!isNaN(d2)) return d2;
    }
    return null;
  }

  function downloadCSV(filename, rows) {
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
  }

  // ================= Data =================
  let epsData = null;
  let locData = null;

  // ================= HiGHS loader (browser-safe) =================
  // Load highs.mjs directly (no esm.sh) so it doesn't think it's Node.
  let highs = null;

  async function loadSolver() {
    if (highs) return highs;

    setStatus("Loading solver (HiGHS)…");

    // This is the host that serves highs.mjs + highs.wasm for browser usage
    const base = "https://lovasoa.github.io/highs-js/";

    // IMPORTANT: avoid node-detection being triggered by polyfills
    // (some environments inject `process` — we force it away)
    try { globalThis.process = undefined; } catch {}

    let mod;
    try {
      mod = await import(base + "highs.mjs");
    } catch (e) {
      console.error(e);
      showError("Could not import highs.mjs. Check network/adblocker. Details: " + (e?.message || e));
    }

    try {
      highs = await mod.default({
        locateFile: (file) => base + file  // tells it where highs.wasm is
      });
    } catch (e) {
      console.error(e);
      showError(
        "Solver failed to load.\n" +
        "Common reasons:\n" +
        "- must open via https (GitHub Pages), not file://\n" +
        "- adblocker blocks wasm\n" +
        "- network blocks wasm/CDNs\n\n" +
        "Details: " + (e?.message || e)
      );
    }

    setStatus("Solver ready. Upload files and validate.", "success");
    return highs;
  }

  // start loading immediately
  await loadSolver();

  // ================= Validation =================
  function runValidation() {
    const requiredEPCols = [
      "ep_id","full_name","gender","earliest_start_date","latest_end_date",
      "preferred_location_1","preferred_location_2","preferred_location_3","preferred_location_4",
      "wants_pair","pair_with_full_name","score"
    ];
    const requiredLocCols = ["loc_code","capacity_total"];

    const epHeaders = Object.keys(epsData?.[0] || {});
    const locHeaders = Object.keys(locData?.[0] || {});

    requiredEPCols.forEach(col => {
      if (!epHeaders.includes(col)) showError(`EPs.csv missing column "${col}"`);
    });
    requiredLocCols.forEach(col => {
      if (!locHeaders.includes(col)) showError(`Locations.csv missing column "${col}"`);
    });

    // duplicates
    const epIds = epsData.map(r => r.ep_id);
    const dupEP = epIds.find((id, i) => epIds.indexOf(id) !== i);
    if (dupEP) showError(`Duplicate ep_id found: ${dupEP}`);

    const locCodes = locData.map(r => normalizeCode(r.loc_code));
    const dupLoc = locCodes.find((id, i) => locCodes.indexOf(id) !== i);
    if (dupLoc) showError(`Duplicate loc_code found: ${dupLoc}`);

    // dates
    epsData.forEach((row, i) => {
      const start = parseDateFlexible(row.earliest_start_date);
      const end = parseDateFlexible(row.latest_end_date);
      if (!start) showError(`Row ${i+2}: earliest_start_date invalid`);
      if (!end) showError(`Row ${i+2}: latest_end_date invalid`);
      if (start > end) showError(`Row ${i+2}: earliest_start_date after latest_end_date`);
    });

    setStatus("Validation successful. You can now run matching.", "success");
    btnRun.disabled = false;
  }

  // ================= Buttons =================
  btnValidate.addEventListener("click", async () => {
    const epsFile = document.getElementById("epsFile").files[0];
    const locFile = document.getElementById("locFile").files[0];
    if (!epsFile || !locFile) showError("Please upload both EPs.csv and Locations.csv");

    setStatus("Reading CSV files…");
    epsData = await parseCSV(epsFile);
    locData = await parseCSV(locFile);

    runValidation();
  });

  btnRun.addEventListener("click", async () => {
    if (!epsData || !locData) showError("Please validate files first.");
    await loadSolver();

    setStatus("Running solver test…");

    // tiny LP test
    const lp = `
Maximize
 obj: x
Subject To
 c1: x <= 1
Bounds
 0 <= x <= 1
End
`.trim();

    let sol;
    try {
      sol = highs.solve(lp);
    } catch (e) {
      console.error(e);
      showError("Solver loaded, but solve() failed: " + (e?.message || e));
    }

    // if we get here, solver works. now prove download works.
    const assignments = epsData.map(ep => ({
      ep_id: ep.ep_id,
      full_name: ep.full_name,
      location: "TO_BE_COMPUTED",
      start_monday: "TO_BE_COMPUTED",
      end_friday: "TO_BE_COMPUTED"
    }));

    downloadCSV("assignment.csv", assignments);
    setStatus("Solver test OK. assignment.csv downloaded. Next step: plug in the real model.", "success");
  });
</script>

</body>
</html>
