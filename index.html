<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AIESEC Matching Tool</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial; max-width: 900px; margin: 40px auto; }
    button { padding:10px 16px; margin:10px 10px 0 0; }
    .error { color: red; }
    .success { color: green; }
    pre { background:#f5f5f5; padding:15px; white-space: pre-wrap; }
    .muted { color: #555; }
  </style>
</head>
<body>

<h1>AIESEC Matching Tool</h1>

<h3>Upload files</h3>
EPs.csv: <input type="file" id="epsFile"><br><br>
Locations.csv: <input type="file" id="locFile"><br><br>

<button id="btnValidate">Validate</button>
<button id="btnRun" disabled>Run Matching</button>

<h3>Status</h3>
<pre id="output">Page loaded. Solver will load automatically…</pre>

<script type="module">
  // ---------------- UI helpers ----------------
  const out = document.getElementById("output");
  const btnValidate = document.getElementById("btnValidate");
  const btnRun = document.getElementById("btnRun");

  function setStatus(msg, cls="") {
    out.className = cls;
    out.textContent = msg;
  }

  function showError(msg) {
    setStatus("ERROR: " + msg, "error");
    throw new Error(msg);
  }

  // ---------------- CSV helpers ----------------
  function parseCSV(file) {
    return new Promise((resolve, reject) => {
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: r => resolve(r.data),
        error: err => reject(err)
      });
    });
  }

  function downloadCSV(filename, rows) {
    const csv = Papa.unparse(rows);
    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
  }

  function normalizeCode(s) {
    return (s || "").toLowerCase().trim().replaceAll(" ", "_");
  }

  function parseDateFlexible(str) {
    if (!str) return null;
    str = String(str).trim();

    // yyyy-mm-dd
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str);

    // dd/mm/yyyy or mm/dd/yyyy (we accept both)
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)) {
      const [a,b,c] = str.split("/");
      const d1 = new Date(`${c}-${b}-${a}`); // dd/mm/yyyy
      if (!isNaN(d1)) return d1;
      const d2 = new Date(`${c}-${a}-${b}`); // mm/dd/yyyy
      if (!isNaN(d2)) return d2;
    }
    return null;
  }

  // ---------------- Data ----------------
  let epsData = null;
  let locData = null;

  // ---------------- HiGHS loader (browser-correct) ----------------
  // IMPORTANT: do not use esm.sh here. It can trigger Node/unenv paths.
  // We load the browser ESM build straight from the highs-js repo via jsDelivr.
  let highs = null;

  async function ensureSolverLoaded() {
    if (highs) return highs;

    setStatus("Loading solver (HiGHS)…", "muted");

    // Pin a version tag that exists in the repo.
    // If you ever update, update BOTH URLs together.
    const base = "https://cdn.jsdelivr.net/gh/lovasoa/highs-js@v1.8.0/build/";

    try {
      // This file name is the browser ESM build produced by highs-js.
      // It must live next to highs.wasm.
      const mod = await import(base + "highs.mjs");
      const highsFactory = mod.default;

      highs = await highsFactory({
        locateFile: (file) => base + file
      });

      setStatus("Solver ready. Upload files, then validate.", "success");
      return highs;
    } catch (e) {
      console.error(e);
      // If this fails, 99% of the time it is because the file name differs in that tag
      // or the tag changed. In that case, use the fallback plan below.
      showError(
        "Solver failed to load.\n\n" +
        "Most common causes:\n" +
        "- GitHub Pages must be opened via https (not file://)\n" +
        "- Network blocks wasm\n" +
        "- The version/tag path does not contain highs.mjs next to highs.wasm\n\n" +
        "Details: " + (e?.message || e)
      );
    }
  }

  // Start loading right away
  ensureSolverLoaded();

  // ---------------- Validation ----------------
  function runValidation() {
    const requiredEPCols = [
      "ep_id","full_name","gender","earliest_start_date","latest_end_date",
      "preferred_location_1","preferred_location_2","preferred_location_3","preferred_location_4",
      "wants_pair","pair_with_full_name","score"
    ];
    const requiredLocCols = ["loc_code","capacity_total"];

    const epHeaders = Object.keys(epsData?.[0] || {});
    const locHeaders = Object.keys(locData?.[0] || {});

    for (const col of requiredEPCols) {
      if (!epHeaders.includes(col)) showError(`EPs.csv missing column "${col}"`);
    }
    for (const col of requiredLocCols) {
      if (!locHeaders.includes(col)) showError(`Locations.csv missing column "${col}"`);
    }

    // duplicates
    const epIds = epsData.map(r => r.ep_id);
    const dupEP = epIds.find((id, i) => epIds.indexOf(id) !== i);
    if (dupEP) showError(`Duplicate ep_id found: ${dupEP}`);

    const locCodes = locData.map(r => normalizeCode(r.loc_code));
    const dupLoc = locCodes.find((id, i) => locCodes.indexOf(id) !== i);
    if (dupLoc) showError(`Duplicate loc_code found: ${dupLoc}`);

    // dates
    epsData.forEach((row, i) => {
      const start = parseDateFlexible(row.earliest_start_date);
      const end = parseDateFlexible(row.latest_end_date);
      if (!start) showError(`Row ${i+2}: earliest_start_date invalid`);
      if (!end) showError(`Row ${i+2}: latest_end_date invalid`);
      if (start > end) showError(`Row ${i+2}: earliest_start_date after latest_end_date`);
    });

    setStatus("Validation successful. You can now run matching.", "success");
    btnRun.disabled = false;
  }

  // ---------------- Button handlers ----------------
  btnValidate.addEventListener("click", async () => {
    const epsFile = document.getElementById("epsFile").files[0];
    const locFile = document.getElementById("locFile").files[0];
    if (!epsFile || !locFile) showError("Please upload both EPs.csv and Locations.csv");

    setStatus("Reading CSV files…", "muted");
    try {
      epsData = await parseCSV(epsFile);
      locData = await parseCSV(locFile);
    } catch (e) {
      console.error(e);
      showError("Could not parse CSV. Check that files are valid CSV with headers.");
    }

    runValidation();
  });

  btnRun.addEventListener("click", async () => {
    if (!epsData || !locData) showError("Please validate files first.");

    await ensureSolverLoaded();

    setStatus("Running solver test…", "muted");

    // Tiny LP sanity test (proves highs.solve works)
    const lp = `
Maximize
 obj: x
Subject To
 c1: x <= 1
Bounds
 0 <= x <= 1
End
`.trim();

    let sol;
    try {
      sol = highs.solve(lp);
    } catch (e) {
      console.error(e);
      showError("Solver loaded, but solve() failed: " + (e?.message || e));
    }

    // Dummy output for now, until you plug in your real model translation
    const assignments = epsData.map(ep => ({
      ep_id: ep.ep_id,
      full_name: ep.full_name,
      location: "TO_BE_COMPUTED",
      start_monday: "TO_BE_COMPUTED",
      end_friday: "TO_BE_COMPUTED"
    }));

    downloadCSV("assignment.csv", assignments);
    setStatus("Solver test OK. assignment.csv downloaded. Next: build the real MILP and solve it.", "success");
  });
</script>

</body>
</html>
